<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <radialGradient id="bgGrad" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E8E3DA"/>
    </radialGradient>
    <radialGradient id="circleGrad" cx="40%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#F5F2EC"/>
      <stop offset="100%" stop-color="#D9D3C7"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#00000020"/>
    </filter>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="92" height="92" rx="22" ry="22" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Circle in the middle -->
  <circle cx="50" cy="50" r="28" fill="url(#circleGrad)"/>
</svg>
